<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti</title>
    <style>
        body {
            font-family: 'Georgia', serif;
            background-color: #fdf6f0; /* Color papel antiguo */
            color: #4a0000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px;
        }
        .sobre {
            background: white;
            padding: 50px;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 600px;
            line-height: 1.8;
            border-left: 10px solid #8b0000;
            position: relative;
        }
        .boton-volver {
            margin-top: 30px;
            text-decoration: none;
            color: #8b0000;
            font-weight: bold;
            border: 1px solid #8b0000;
            padding: 10px 20px;
            border-radius: 20px;
            transition: 0.3s;
        }
        .boton-volver:hover {
            background: #8b0000;
            color: white;
        }
    </style>
</head>
<body>

    <div class="sobre">
        <h2>Mi mensaje para ti...</h2>
        <p>
            Escribe aquí todo lo que quieras decirle. Este espacio es solo para ella.
        </p>
    </div>

    <a href="index.html" class="boton-volver">← Volver a las cartas</a>

</body>
</html>
