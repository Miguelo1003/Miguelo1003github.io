<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Las Cartas de un Extraño</title>
    <style>
        :root {
            --rojo-oscuro: #4a0000;
            --rojo-brillante: #8b0000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--rojo-oscuro) 0%, var(--rojo-brillante) 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .grid-cartas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .opcion {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .opcion:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        }

        /* Bordes de colores para diferenciar las cartas */
        .btn-graduacion { border-bottom: 5px solid #ffd700; } 
        .btn-mal { border-bottom: 5px solid #3498db; }        
        .btn-cumple { border-bottom: 5px solid #e91e63; }      
        .btn-sola { border-bottom: 5px solid #9b59b6; }       
        .btn-disconforme { border-bottom: 5px solid #1abc9c; } 
        .btn-querer { border-bottom: 5px solid #f1c40f; }      

        p.instruccion {
            margin-top: 2.5rem;
            font-style: italic;
            opacity: 0.8;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <h1>Para esos momentos especiales</h1>
    
<div class="grid-cartas">
    <a href="graduacion.html" class="opcion btn-graduacion">
        🎓 1. Para tu graduación
    </a>
    
    <a href="mal.html" class="opcion btn-mal">
        💙 2. Cuando te sientas mal
    </a>
    
    <a href="cumple.html" class="opcion btn-cumple">
        🎂 3. Feliz Cumpleaños
    </a>
    
    <a href="sola.html" class="opcion btn-sola">
        🌙 4. Cuando te sientas sola
    </a>

    <a href="disconfrme.html" class="opcion btn-disconforme">
        ✨ 5. Cuando estés disconforme con vos misma
    </a>

    <a href="querer.html" class="opcion btn-querer">
        ❤️ 6. Cuando necesites saber cuánto te quiero
    </a>
</div>
    <p class="instruccion">Haz clic en la carta que tu corazón necesite leer hoy.</p>

</body>
</html>
